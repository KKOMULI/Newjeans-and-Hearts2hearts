<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body{width:360px;margin:0;background:#14161B;color:#E9E5DD;
    font-family:-apple-system,Inter,Helvetica,Arial,sans-serif;font-size:13px;}
  .pad{padding:16px;}
  h2{font-size:15px;font-weight:600;margin:0 0 4px;}
  .sub{font-size:11.5px;color:#9A958C;line-height:1.5;margin-bottom:14px;}
  .baselineBox{border:1px solid #2F333C;background:#1A1D24;border-radius:8px;padding:10px;margin:0 0 14px;}
  .baselineBox label{display:block;font-size:12px;margin-bottom:6px;color:#E9E5DD;}
  .amountInput{width:100%;box-sizing:border-box;background:#101218;border:1px solid #2F333C;color:#E9E5DD;border-radius:5px;padding:9px 10px;font-size:13px;}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
  .chips button{background:#252934;border:1px solid #2F333C;color:#B7B2A8;font-size:11.5px;padding:6px 8px;border-radius:14px;cursor:pointer;}
  .chips button.on{border-color:#6F8FA6;color:#E9E5DD;background:#202830;}
  .baselinePreview{font-size:11px;color:#CC8A45;line-height:1.45;margin-top:7px;display:none;}
  .q{margin-bottom:14px;}
  .q p{margin:0 0 6px;font-size:12.5px;}
  .opts{display:flex;flex-wrap:wrap;gap:5px;}
  .opts button{background:#252934;border:1px solid #2F333C;color:#B7B2A8;
    font-size:11.5px;padding:6px 9px;border-radius:14px;cursor:pointer;text-align:left;}
  .hint{font-size:11px;color:#6F8FA6;line-height:1.45;margin:-2px 0 6px;}
  .preview{font-size:11.5px;color:#CC8A45;line-height:1.5;margin:0 0 10px;display:none;}
  .opts button.on{border-color:#6F8FA6;color:#E9E5DD;background:#202830;}
  .save{width:100%;background:#E9E5DD;color:#14161B;border:none;border-radius:3px;
    padding:11px 0;font-weight:600;font-size:13px;cursor:pointer;margin-top:4px;}
  .save:disabled{opacity:.4;cursor:not-allowed;}
  .divider{border-top:1px solid #2F333C;margin:16px 0;}
  .toggle{display:flex;justify-content:space-between;align-items:center;font-size:12px;}
  .small{font-size:11px;color:#9A958C;line-height:1.5;margin-top:4px;}
  .danger{background:transparent;border:1px solid #2F333C;color:#B7B2A8;
    width:100%;padding:9px 0;border-radius:3px;cursor:pointer;font-size:12px;margin-top:8px;}
  .debugOpen{background:#202830;border:1px solid #6F8FA6;color:#E9E5DD;
    width:100%;padding:10px 0;border-radius:3px;cursor:pointer;font-size:12px;margin-top:8px;font-weight:600;}
  .done{color:#7C9A6E;font-size:12px;margin-top:8px;display:none;}
</style>
</head>
<body>
<div class="pad">
  <h2>mIrror</h2>
  <div class="sub">먼저 편한 1회 주문금액을 직접 정하고, 12문항 온보딩으로 시작 기준선을 보정합니다. 이후에는 설치 이후의 거래와 낮은 신뢰도의 seed baseline을 섞어 점점 당신에게 맞춰집니다. 답변은 이 기기에만 저장됩니다.</div>

  <div class="baselineBox" id="baselineBox">
    <label for="comfortAmount">0. 편한 1회 주문금액</label>
    <input class="amountInput" id="comfortAmount" inputmode="numeric" autocomplete="off" placeholder="예: 1,000,000">
    <div class="chips" id="amountChips">
      <button type="button" data-amount="100000">10만</button>
      <button type="button" data-amount="300000">30만</button>
      <button type="button" data-amount="600000">60만</button>
      <button type="button" data-amount="1000000">100만</button>
      <button type="button" data-amount="1500000">150만</button>
      <button type="button" data-amount="3000000">300만</button>
    </div>
    <div class="baselinePreview" id="baselinePreview"></div>
  </div>

  <div id="preview" class="preview"></div>
  <div id="survey"></div>
  <button class="save" id="saveBtn" disabled>이 답변으로 시작</button>
  <div class="done" id="doneMsg">저장됐습니다. Upbit 거래 페이지에서 작동합니다.</div>

  <div class="divider"></div>
  <div class="toggle">
    <span>강한 경고는 팝업으로 한 번 멈춰보기</span>
    <input type="checkbox" id="breakPopup">
  </div>
  <div class="small">꺼두면 매수창 아래 경고 배너만 표시합니다. 기본은 꺼짐.</div>

  <button class="debugOpen" id="openDebugTradeBtn">디버깅용 모의 매매창 열기</button>
  <div class="small">실제 주문 없이 seed 시나리오와 직접 입력값으로 거울 카드가 어떻게 뜨는지 확인합니다.</div>

  <button class="danger" id="inspectBtn">내 데이터 보기 (열람권)</button>
  <button class="danger" id="resetBtn">전체 초기화 (삭제권)</button>
  <pre id="dump" style="display:none;white-space:pre-wrap;font-size:10px;color:#9A958C;max-height:140px;overflow:auto;background:#1C1F26;padding:8px;border-radius:3px;margin-top:8px;"></pre>
</div>

<script src="mirror-data.js"></script>
<script src="popup.js"></script>
</body>
</html>
